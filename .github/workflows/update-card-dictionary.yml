name: Update card dictionary

on:
  workflow_dispatch:
    inputs:
      set_code:
        description: '更新対象セットコード（例: MSH）。空欄は全体更新'
        required: false
        default: ''
        type: string
      retranslate_events:
        description: '既存イベントJSONを再変換する'
        required: true
        default: true
        type: boolean
      rebuild_search_index:
        description: '検索インデックスを再生成する'
        required: true
        default: true
        type: boolean

concurrency:
  group: update-card-dictionary
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    outputs:
      pages_changed: ${{ steps.pages_changes.outputs.changed }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run update:dictionary
        env:
          SET_CODE: ${{ inputs.set_code }}
      - run: npm run rebuild:data
        if: ${{ inputs.retranslate_events }}
      - run: npm run build:index
        if: ${{ inputs.rebuild_search_index }}
      - run: npm run audit:translations
      - run: npm run audit:set
        if: ${{ inputs.set_code != '' }}
        env:
          SET_CODE: ${{ inputs.set_code }}
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: Check for Pages data changes
        id: pages_changes
        run: |
          if [[ -n "$(git status --porcelain -- public/data)" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Commit dictionary changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update card dictionary'
          file_pattern: 'data/cards data/events public/data'

  deploy:
    needs: update
    if: needs.update.outputs.pages_changed == 'true'
    uses: ./.github/workflows/deploy-pages.yml
    with:
      ref: main
