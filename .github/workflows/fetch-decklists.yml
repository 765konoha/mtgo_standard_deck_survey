name: Fetch MTGO decklists

on:
  schedule:
    # 21:00, 05:00, 13:00 UTC = 06:00, 14:00, 22:00 JST
    - cron: '0 21,5,13 * * *'
  workflow_dispatch:
    inputs:
      force_refetch:
        description: 'Completed eventsも再取得する'
        required: false
        default: false
        type: boolean
      lookback_days:
        description: '過去何日分のイベントを遡って取得するか'
        required: false
        default: '3'
        type: string
      force_backfill:
        description: '過去イベントをバックフィルする'
        required: false
        default: false
        type: boolean

concurrency:
  group: fetch-mtgo-decklists
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  fetch:
    outputs:
      pages_changed: ${{ steps.pages_changes.outputs.changed }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run fetch:decklists
        env:
          FORCE_REFETCH: ${{ inputs.force_refetch || false }}
          FORCE_BACKFILL: ${{ inputs.force_backfill || false }}
          LOOKBACK_DAYS: ${{ inputs.lookback_days || '3' }}
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: Check for Pages data changes
        id: pages_changes
        run: |
          if [[ -n "$(git status --porcelain -- public/data)" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Commit data changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update mtgo decklists'
          file_pattern: 'data public/data'

  deploy:
    needs: fetch
    if: needs.fetch.outputs.pages_changed == 'true'
    uses: ./.github/workflows/deploy-pages.yml
    with:
      ref: main
