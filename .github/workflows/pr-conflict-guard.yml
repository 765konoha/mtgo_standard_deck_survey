name: PR conflict guard

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-conflict-guard-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  generated-data-conflict-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Fetch base branch
        env:
          BASE_REF: ${{ github.base_ref || 'main' }}
        run: git fetch --no-tags origin "$BASE_REF"
      - name: Check generated-data conflict risk
        env:
          BASE_REF: ${{ github.base_ref || 'main' }}
        run: npm run check:conflict-risk -- --base="origin/$BASE_REF"
